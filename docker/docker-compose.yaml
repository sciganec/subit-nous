version: '3.8'

services:
  nous-api:
    build: .
    container_name: subit-nous-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # mount a local folder for analysis
      - ./output:/app/output      # where results will be saved
    environment:
      - PYTHONUNBUFFERED=1
    command: nous serve --host 0.0.0.0 --port 8000
    restart: unless-stopped

  # Optional: a simple web UI (if you add one later)
